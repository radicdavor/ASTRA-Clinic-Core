name: astra-clinic-core

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-astra_clinic}
      POSTGRES_USER: ${POSTGRES_USER:-astra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-astra}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-astra} -d ${POSTGRES_DB:-astra_clinic}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://astra:astra@db:5432/astra_clinic}
      JWT_SECRET: ${JWT_SECRET:-change-this-local-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CORS_ORIGIN_REGEX: ${CORS_ORIGIN_REGEX:-^https?://(localhost|127\.0\.0\.1|10\.[0-9]+\.[0-9]+\.[0-9]+|192\.168\.[0-9]+\.[0-9]+|172\.(1[6-9]|2[0-9]|3[0-1])\.[0-9]+\.[0-9]+)(:[0-9]+)?$}
      DEMO_MODE: ${DEMO_MODE:-true}
      REAL_DATA_ALLOWED: ${REAL_DATA_ALLOWED:-false}
      FISCALIZATION_MODE: ${FISCALIZATION_MODE:-noop}
      OCR_PROVIDER_MODE: ${OCR_PROVIDER_MODE:-local_demo}
      REMINDER_PROVIDER_MODE: ${REMINDER_PROVIDER_MODE:-local_demo}
      AI_SUMMARY_PROVIDER_MODE: ${AI_SUMMARY_PROVIDER_MODE:-local_deterministic}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      AI_DIAGNOSIS_SUGGESTIONS_ENABLED: ${AI_DIAGNOSIS_SUGGESTIONS_ENABLED:-false}
      AI_DIAGNOSIS_SUGGESTIONS_PRODUCTION_AUTHORIZED: ${AI_DIAGNOSIS_SUGGESTIONS_PRODUCTION_AUTHORIZED:-false}
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - document_storage:/app/data/documents
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    ports:
      - "0.0.0.0:5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  document_storage:
