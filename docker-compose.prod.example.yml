name: astra-clinic-core-production-example

services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:?Set POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER:?Set POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set a strong POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      - APP_ENV=production
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL:?Set production DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET:?Set a strong JWT_SECRET}
      - ACCESS_TOKEN_MINUTES=${ACCESS_TOKEN_MINUTES:-480}
      - CORS_ORIGINS=${CORS_ORIGINS:?Set explicit production CORS_ORIGINS}
      - CORS_ORIGIN_REGEX=
      - DEBUG=false
      - RELOAD=false
      - DEMO_MODE=false
      - DEMO_SEED_ENABLED=false
      - AUTO_CREATE_DEFAULT_ADMIN=false
      - REAL_DATA_ALLOWED=true
      - FISCALIZATION_MODE=${FISCALIZATION_MODE:?Set production fiscalization mode}
      - OCR_PROVIDER_MODE=${OCR_PROVIDER_MODE:?Set production OCR mode or explicitly approved disabled mode}
      - REMINDER_PROVIDER_MODE=${REMINDER_PROVIDER_MODE:?Set production reminder mode or explicitly approved disabled mode}
      - AI_SUMMARY_PROVIDER_MODE=${AI_SUMMARY_PROVIDER_MODE:?Set production AI summary mode or explicitly approved disabled mode}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-mini}
      - AI_DIAGNOSIS_SUGGESTIONS_ENABLED=false
      - AI_DIAGNOSIS_SUGGESTIONS_PRODUCTION_AUTHORIZED=false
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?Set production API base URL}
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
