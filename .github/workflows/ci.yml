name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: astra_ci
          POSTGRES_USER: astra
          POSTGRES_PASSWORD: astra
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U astra -d astra_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://astra:astra@localhost:5432/astra_ci
      TEST_DATABASE_URL: postgresql+psycopg://astra:astra@localhost:5432/astra_ci
      ASTRA_REQUIRE_TEST_DATABASE: "true"
      JWT_SECRET: ci-secret-key-for-quality-gate-tests
      JWT_SECRET_KEY: ci-secret-key
      DOCUMENT_STORAGE_PATH: /tmp/astra-documents
      PYTHONPATH: ${{ github.workspace }}/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Check generated OpenAPI frontend types
        run: python scripts/generate_openapi_types.py --check
      - name: Run database migrations
        working-directory: backend
        run: |
          test "$(alembic heads | wc -l)" -eq 1
          alembic upgrade head
          alembic downgrade -1
          alembic upgrade head
      - name: Run fast backend feedback gate
        working-directory: backend
        run: python ../scripts/run_test_gate.py fast
      - name: Run backend non-integration tests
        working-directory: backend
        run: python -m pytest -m "not integration"
      - name: Run explicit PostgreSQL integration gate
        working-directory: backend
        run: python -m pytest tests/integration -q -rs
      - name: Validate synthetic test backup and restore
        env:
          SOURCE_DATABASE_URL: postgresql://astra:astra@localhost:5432/astra_ci
          TARGET_DATABASE_URL: postgresql://astra:astra@localhost:5432/astra_restore_test
        run: docker run --rm --network host -v "$PWD:/workspace:ro" -w /workspace -e SOURCE_DATABASE_URL -e TARGET_DATABASE_URL postgres:16-alpine sh scripts/validate_test_backup_restore.sh

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck
      - name: Test frontend interactions
        working-directory: frontend
        run: npm test -- --run
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run browser E2E smoke
        working-directory: frontend
        run: npm run e2e
      - name: Frontend pilot smoke
        working-directory: frontend
        run: npm run smoke
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  e2e-db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: astra_ci_e2e
          POSTGRES_USER: astra
          POSTGRES_PASSWORD: astra
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U astra -d astra_ci_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ASTRA_E2E_DATABASE_URL: postgresql+psycopg://astra:astra@127.0.0.1:5432/astra_ci_e2e_run
      JWT_SECRET: ci-e2e-jwt-secret-with-no-production-value
      PYTHONPATH: ${{ github.workspace }}/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run DB-backed full-stack E2E smoke
        working-directory: frontend
        run: npm run e2e:db

  recovery:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-bookworm
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: astra
          POSTGRES_PASSWORD: astra
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U astra -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Build pinned PostgreSQL recovery image
        run: docker build -f backend/Dockerfile.recovery -t astra-recovery-ci .
      - name: Run complete synthetic recovery gate
        env:
          RECOVERY_ADMIN_DATABASE_URL: postgresql://astra:astra@127.0.0.1:5432/postgres
          ASTRA_APPLICATION_COMMIT: ${{ github.sha }}
        run: >-
          docker run --rm --network host
          -e RECOVERY_ADMIN_DATABASE_URL
          -e ASTRA_APPLICATION_COMMIT
          astra-recovery-ci scripts/run_recovery_integration.py
